<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library — Arcanum</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .library-hero {
            padding: 3rem 0 2.5rem;
            background: var(--warm-white);
            border-bottom: 1px solid var(--border);
        }
        .library-hero .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .library-user-info h1 { font-size: 2rem; font-weight: 500; }
        .library-user-info p { color: var(--ink-muted); font-size: 0.9rem; }
        .library-stats { display: flex; gap: 2rem; }
        .library-stat { text-align: center; }
        .library-stat .stat-num {
            font-family: var(--font-display);
            font-size: 2rem; font-weight: 600;
            color: var(--gold); display: block;
        }
        .library-stat .stat-label {
            font-size: 0.72rem; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--ink-muted);
        }
        .library-empty {
            text-align: center; padding: 6rem 2rem;
        }
        .library-empty svg {
            width: 64px; height: 64px; stroke: var(--border);
            fill: none; stroke-width: 1; margin-bottom: 1.5rem;
        }
        .library-empty h2 { font-size: 1.5rem; font-weight: 400; margin-bottom: 0.8rem; }
        .library-empty p { color: var(--ink-muted); margin-bottom: 2rem; font-size: 0.95rem; }
        .library-book-card {
            background: var(--warm-white); border: 1px solid var(--border);
            display: flex; gap: 1.5rem; padding: 1.5rem;
            margin-bottom: 1rem; transition: var(--transition);
        }
        .library-book-card:hover { box-shadow: var(--shadow-card); }
        .library-book-cover {
            width: 90px; height: 130px; object-fit: cover;
            flex-shrink: 0; border-radius: 2px;
        }
        .library-book-info { flex: 1; display: flex; flex-direction: column; }
        .library-book-info h3 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.2rem; }
        .library-book-info .lib-author {
            font-size: 0.88rem; color: var(--ink-muted);
            font-style: italic; margin-bottom: 0.4rem;
        }
        .library-book-info .lib-category {
            font-size: 0.68rem; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--gold); margin-bottom: 0.8rem;
        }
        .library-book-actions { margin-top: auto; display: flex; gap: 0.8rem; }
        .library-book-actions .btn { padding: 0.45rem 1rem; font-size: 0.7rem; }
        .logout-btn {
            font-size: 0.78rem; color: var(--crimson);
            text-transform: uppercase; letter-spacing: 1.5px;
            font-weight: 500; cursor: pointer; opacity: 0.8;
        }
        .logout-btn:hover { opacity: 1; }
        @media (max-width: 768px) {
            .library-hero .container { flex-direction: column; text-align: center; gap: 1.5rem; }
            .library-book-card { flex-direction: column; align-items: center; text-align: center; }
            .library-book-actions { justify-content: center; }
        }
    </style>
</head>
<body data-page="library">

    <!-- ═══ NAVBAR ═══ -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">ARCANUM</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="books.html">Catalog</a>
                <a href="library.html">My Library</a>
                <span class="nav-divider"></span>
                <button class="cart-trigger" id="cart-trigger">
                    <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                    Cart
                    <span class="cart-badge">0</span>
                </button>
            </div>
            <button class="nav-toggle" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- ═══ LIBRARY HEADER ═══ -->
    <header class="library-hero">
        <div class="container">
            <div class="library-user-info">
                <h1 id="lib-greeting">My Library</h1>
                <p id="lib-email"></p>
            </div>
            <div style="display: flex; align-items: center; gap: 2rem;">
                <div class="library-stats" id="lib-stats">
                    <div class="library-stat">
                        <span class="stat-num" id="stat-books">0</span>
                        <span class="stat-label">Books Owned</span>
                    </div>
                    <div class="library-stat">
                        <span class="stat-num" id="stat-spent">₹0</span>
                        <span class="stat-label">Total Invested</span>
                    </div>
                </div>
                <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
            </div>
        </div>
    </header>

    <!-- ═══ LIBRARY CONTENT ═══ -->
    <section class="section" id="lib-content">
        <div class="container" id="lib-container">
            <p style="text-align:center; padding: 3rem 0; color: var(--ink-faint);">Loading your library...</p>
        </div>
    </section>

    <!-- ═══ FOOTER ═══ -->
    <footer>
        <div class="container">
            <div class="footer-bottom" style="border:none; padding-top: 0;">
                <p>&copy; 2026 Arcanum Rare Books. All rights reserved.</p>
                <p><a href="books.html" style="color: var(--gold);">Browse Catalog</a></p>
            </div>
        </div>
    </footer>

    <!-- ═══ CART SIDEBAR ═══ -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-top">
            <h2>Your Selection</h2>
            <button class="cart-close" id="cart-close">&times;</button>
        </div>
        <div class="cart-body" id="cart-body"></div>
        <div class="cart-bottom">
            <div class="cart-summary-row">
                <span>Items</span>
                <span class="cart-badge">0</span>
            </div>
            <div class="cart-summary-row total">
                <span>Total</span>
                <span id="cart-total">₹0</span>
            </div>
            <button class="btn btn-primary cart-checkout-btn">Proceed to Checkout</button>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const BOOK_COVER_MAP_LIB = {
            1:'https://images.unsplash.com/photo-1562979314-bee7453e911c?w=600&h=800&fit=crop',
            2:'https://images.unsplash.com/photo-1539650116574-8efeb43e2750?w=600&h=800&fit=crop',
            3:'https://images.unsplash.com/photo-1524492412937-b28074a5d7da?w=600&h=800&fit=crop',
            4:'https://images.unsplash.com/photo-1518638150340-f706e86654de?w=600&h=800&fit=crop',
            5:'https://images.unsplash.com/photo-1618053448492-2b629c2c912a?w=600&h=800&fit=crop',
            6:'https://images.unsplash.com/photo-1566438480900-0609be27a4be?w=600&h=800&fit=crop',
            7:'https://images.unsplash.com/photo-1589308078059-be1415eab4c3?w=600&h=800&fit=crop',
            8:'https://images.unsplash.com/photo-1504457047772-27faf1c00561?w=600&h=800&fit=crop',
            9:'https://images.unsplash.com/photo-1585521551237-aade4bbd7acb?w=600&h=800&fit=crop',
            10:'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=600&h=800&fit=crop',
            11:'https://images.unsplash.com/photo-1564399580075-5dfe19c205f0?w=600&h=800&fit=crop',
            12:'https://images.unsplash.com/photo-1551076805-e1869033e561?w=600&h=800&fit=crop',
            13:'https://images.unsplash.com/photo-1589998059171-988d887df646?w=600&h=800&fit=crop',
            14:'https://images.unsplash.com/photo-1534447677768-be436bb09401?w=600&h=800&fit=crop',
            15:'https://images.unsplash.com/photo-1553729784-e91953dec042?w=600&h=800&fit=crop',
            16:'https://images.unsplash.com/photo-1509228468518-180dd4864904?w=600&h=800&fit=crop',
            17:'https://images.unsplash.com/photo-1530497610245-94d3c16cda28?w=600&h=800&fit=crop',
            18:'https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=600&h=800&fit=crop',
            19:'https://images.unsplash.com/photo-1532693322450-2cb5c511067d?w=600&h=800&fit=crop',
            20:'https://images.unsplash.com/photo-1532094349884-543bc11b234d?w=600&h=800&fit=crop'
        };
        const LIB_FALLBACK = 'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=600&h=800&fit=crop';

        document.addEventListener('DOMContentLoaded', async () => {
            if (!isLoggedIn()) {
                window.location.href = 'login.html';
                return;
            }

            const user = getUser();
            if (user) {
                document.getElementById('lib-greeting').textContent = `${user.name}'s Library`;
                document.getElementById('lib-email').textContent = user.email;
            }

            const container = document.getElementById('lib-container');

            try {
                const data = await apiFetch('/my-library');

                // Update stats
                document.getElementById('stat-books').textContent = data.total_books;
                const totalSpent = data.user ? parseFloat(data.user.total_spent || 0) : 0;
                document.getElementById('stat-spent').textContent = `₹${totalSpent.toLocaleString('en-IN')}`;

                if (user && data.user) {
                    document.getElementById('lib-greeting').textContent = `${data.user.name}'s Library`;
                    document.getElementById('lib-email').textContent = data.user.email;
                }

                if (data.books.length === 0) {
                    container.innerHTML = `
                        <div class="library-empty">
                            <svg viewBox="0 0 24 24">
                                <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
                                <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
                            </svg>
                            <h2>Your library is empty</h2>
                            <p>Texts you purchase will appear here for permanent access.</p>
                            <a href="books.html" class="btn btn-primary">
                                Browse the Catalog
                                <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                            </a>
                        </div>`;
                } else {
                    container.innerHTML = data.books.map(book => {
                        const mappedId = ((book.id - 1) % 20) + 1;
                        const cover = book.cover_image_path
                            ? (book.cover_image_path.startsWith('http') ? book.cover_image_path : `${SERVER_BASE}/${book.cover_image_path.startsWith('uploads/') ? book.cover_image_path : 'uploads/' + book.cover_image_path}`)
                            : (BOOK_COVER_MAP_LIB[mappedId] || LIB_FALLBACK);

                        return `
                        <div class="library-book-card">
                            <img src="${cover}" alt="${book.title}" class="library-book-cover" onerror="this.onerror=null;this.src='${LIB_FALLBACK}'">
                            <div class="library-book-info">
                                <div class="lib-category">${book.category_name || ''}</div>
                                <h3>${book.title}</h3>
                                <p class="lib-author">${book.author}</p>
                                <div class="library-book-actions">
                                    <button class="btn btn-primary btn-sm" onclick="readBook(${book.id})">
                                        <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
                                        Read Now
                                    </button>
                                    <a href="book-detail.html?id=${book.id}" class="btn btn-sm">View Details</a>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                }
            } catch (err) {
                container.innerHTML = `<div class="library-empty">
                    <h2>Failed to load library</h2>
                    <p>${err.message}</p>
                    <a href="login.html" class="btn btn-primary">Sign In Again</a>
                </div>`;
            }
        });

        function handleLogout() {
            localStorage.removeItem('arcanum_user');
            localStorage.removeItem('arcanum_token');
            showToast('Signed out');
            setTimeout(() => window.location.href = 'index.html', 600);
        }
    </script>
</body>
</html>
