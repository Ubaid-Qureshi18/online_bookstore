<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Arcanum</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-auth">
        <div class="admin-auth-card">
            <div style="text-align:center;margin-bottom:1.5rem;">
                <span style="font-size:1.1rem;font-weight:600;letter-spacing:2px;">ARCANUM</span>
                <span style="display:block;font-size:0.65rem;text-transform:uppercase;letter-spacing:2px;color:#B8963E;margin-top:2px;">Admin Portal</span>
            </div>
            <h1>Admin Sign In</h1>
            <p class="auth-sub">Access the management dashboard</p>

            <div id="admin-error" style="display:none; background:#EF444411; color:#EF4444; padding:0.7rem 1rem; margin-bottom:1rem; font-size:0.85rem; border-radius:6px; border:1px solid #EF444422;"></div>

            <form id="admin-login-form">
                <div class="form-group">
                    <label for="admin-username">Username</label>
                    <input type="text" id="admin-username" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input type="password" id="admin-password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-admin btn-admin-primary" id="admin-login-btn">Sign In</button>
            </form>

            <div style="text-align:center;margin-top:2rem;">
                <a href="../index.html" style="font-size:0.8rem;color:#8B8F9A;">← Back to Storefront</a>
            </div>
        </div>
    </div>

    <script>
        const SERVER_BASE = ((window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') && window.location.port !== '3000')
          ? 'http://localhost:3000'
          : window.location.origin;
        const API_BASE = SERVER_BASE + '/api';

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorEl = document.getElementById('admin-error');
            const btn = document.getElementById('admin-login-btn');

            const username = document.getElementById('admin-username').value;
            const password = document.getElementById('admin-password').value;

            errorEl.style.display = 'none';
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                const res = await fetch(API_BASE + '/auth/admin-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Login failed');

                localStorage.setItem('arcanum_admin_token', data.token);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
