<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Arcanum Admin</title>
    <link rel="stylesheet" href="../css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="admin-layout">
        <div id="sidebar"></div>
        <div class="admin-main">
            <div class="admin-topbar">
                <div>
                    <h1>Dashboard</h1>
                    <span class="breadcrumb">Admin / Overview</span>
                </div>
                <button class="btn-admin" onclick="adminLogout()">
                    <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign Out
                </button>
            </div>
            <div class="admin-content">

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span>Total Revenue</span>
                            <div class="stat-icon gold"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
                        </div>
                        <div class="stat-value" id="stat-revenue">—</div>
                        <div class="stat-change">Live data</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span>Books Sold</span>
                            <div class="stat-icon blue"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg></div>
                        </div>
                        <div class="stat-value" id="stat-sold">—</div>
                        <div class="stat-change">Completed orders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span>Total Users</span>
                            <div class="stat-icon purple"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
                        </div>
                        <div class="stat-value" id="stat-users">—</div>
                        <div class="stat-change">Registered researchers</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <span>Orders Today</span>
                            <div class="stat-icon green"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg></div>
                        </div>
                        <div class="stat-value" id="stat-today">—</div>
                        <div class="stat-change">Active pipeline</div>
                    </div>
                </div>

                <!-- Chart + Recent Orders -->
                <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap: 1.5rem;">
                    <div class="panel">
                        <div class="panel-header">
                            <h2>Revenue Trend</h2>
                        </div>
                        <div class="panel-body">
                            <div class="chart-container">
                                <canvas id="revenue-chart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">
                            <h2>Recent Orders</h2>
                            <a href="orders.html" class="btn-admin" style="font-size:0.72rem;">View All</a>
                        </div>
                        <div class="panel-body" style="padding:0;">
                            <table class="data-table">
                                <thead>
                                    <tr><th>User</th><th>Book</th><th>Amount</th><th>Status</th></tr>
                                </thead>
                                <tbody id="recent-orders-body">
                                    <tr><td colspan="4" style="text-align:center;padding:2rem;color:#8B8F9A;">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="../js/admin.js"></script>
    <script>
        checkAdminAuth();
        document.getElementById('sidebar').innerHTML = renderSidebar('dashboard');

        (async () => {
            try {
                const data = await adminFetch('/admin/stats');

                // Stats
                document.getElementById('stat-revenue').textContent = formatINR(data.stats.totalRevenue);
                document.getElementById('stat-sold').textContent = data.stats.booksSold;
                document.getElementById('stat-users').textContent = data.stats.totalUsers;
                document.getElementById('stat-today').textContent = data.stats.newOrdersToday;

                // Recent orders
                const tbody = document.getElementById('recent-orders-body');
                if (data.recentOrders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:2rem;color:#8B8F9A;">No orders yet</td></tr>';
                } else {
                    tbody.innerHTML = data.recentOrders.slice(0, 8).map(o => `
                        <tr>
                            <td><div class="user-cell"><div class="avatar">${getInitials(o.user_name)}</div>${o.user_name.split(' ')[0]}</div></td>
                            <td style="font-size:0.82rem;">${o.book_title}</td>
                            <td>${formatINR(o.amount_paid)}</td>
                            <td>${getStatusBadge(o.status)}</td>
                        </tr>
                    `).join('');
                }

                // Revenue Chart
                const ctx = document.getElementById('revenue-chart').getContext('2d');
                const chartData = data.monthlyRevenue.length > 0 ? data.monthlyRevenue : [{ month: 'Now', revenue: 0 }];

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: chartData.map(d => d.month),
                        datasets: [{
                            label: 'Revenue (₹)',
                            data: chartData.map(d => parseFloat(d.revenue)),
                            backgroundColor: 'rgba(184, 150, 62, 0.15)',
                            borderColor: '#B8963E',
                            borderWidth: 2,
                            borderRadius: 6,
                            hoverBackgroundColor: 'rgba(184, 150, 62, 0.3)'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: { callbacks: { label: ctx => formatINR(ctx.raw) } }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: { color: '#F0F1F3' },
                                ticks: { callback: v => '₹' + (v/1000) + 'k', font: { size: 11 } }
                            },
                            x: { grid: { display: false }, ticks: { font: { size: 11 } } }
                        }
                    }
                });
            } catch (err) {
                console.error('Dashboard error:', err);
            }
        })();
    </script>
</body>
</html>
